<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>2026 工作日看板</title>
    <style>
      :root {
        --bg-color: #f8f9ff;
        --card-bg: rgba(255, 255, 255, 0.8);
        --text-main: #1d1d1f;
        --text-sec: #86868b;
        --blue: #0071e3;
        --blue-grad: linear-gradient(135deg, #0071e3, #40a9ff);
        --red: #ff3b30;
        --green: #34c759;
        --border: rgba(0, 0, 0, 0.05);
        --glass-border: rgba(255, 255, 255, 0.3);
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue",
          Arial, sans-serif;
        background: radial-gradient(circle at top right, #eef2ff, #f8f9ff);
        color: var(--text-main);
        margin: 0;
        padding: 16px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      .app-container {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        z-index: 10;
        padding-bottom: 32px;
      }

      .card {
        background-color: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 18px;
        border: 1px solid var(--glass-border);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
        transition:
          transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
          box-shadow 0.3s;
      }

      .card:active {
        transform: scale(0.98);
      }

      .header {
        text-align: center;
        margin-bottom: 4px;
      }
      .header h1 {
        font-size: 20px;
        font-weight: 700;
        margin: 0 0 6px 0;
        letter-spacing: -0.5px;
      }
      .header .subtitle {
        font-size: 13px;
        color: var(--text-sec);
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }
      .status-badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 600;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .status-work {
        background: var(--blue-grad);
        color: white;
      }
      .status-rest {
        background: linear-gradient(135deg, #34c759, #a3e635);
        color: white;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .list-title {
        font-size: 12px;
        color: var(--text-sec);
        margin-bottom: 12px;
        font-weight: 600;
        display: flex;
        justify-content: space-between;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 6px 0;
        font-size: 14px;
      }
      .val {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        font-size: 16px;
      }

      .progress-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .progress-group {
        width: 100%;
      }
      .progress-header {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-sec);
        margin-bottom: 6px;
        font-weight: 500;
      }
      .progress-track {
        height: 8px;
        background-color: rgba(0, 0, 0, 0.05);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--blue-grad);
        width: 0%;
        border-radius: 4px;
        transition: width 1s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .calendar-section {
        padding: 16px;
      }
      .cal-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .cal-controls button {
        background: rgba(0, 0, 0, 0.03);
        border: none;
        color: var(--blue);
        width: 36px;
        height: 36px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background 0.2s;
      }
      .cal-controls button:hover {
        background: rgba(0, 0, 0, 0.06);
      }
      .cal-controls span {
        font-size: 16px;
        font-weight: 700;
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 4px;
      }
      .cal-lbl {
        text-align: center;
        font-size: 11px;
        color: var(--text-sec);
        font-weight: 600;
        padding-bottom: 8px;
      }

      .cal-day {
        aspect-ratio: 1;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        font-size: 15px;
        background: rgba(0, 0, 0, 0.02);
        cursor: default;
      }

      .cal-day.empty {
        background: none;
      }

      .day-holiday {
        color: var(--red);
        background-color: #fff2f2;
      }
      .day-rest {
        color: var(--text-sec);
      }
      .day-work {
        color: var(--text-main);
        font-weight: 500;
      }

      .day-today {
        background: var(--blue-grad);
        color: white !important;
        box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        transform: scale(1.05);
        z-index: 2;
      }

      .badge {
        font-size: 8px;
        font-weight: 700;
        margin-top: 2px;
        opacity: 0.8;
      }
      .holiday-name {
        position: absolute;
        top: 2px;
        right: 4px;
        font-size: 7px;
        font-weight: 600;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .app-container > * {
        animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .app-container > *:nth-child(2) {
        animation-delay: 0.1s;
      }
      .app-container > *:nth-child(3) {
        animation-delay: 0.2s;
      }
      .app-container > *:nth-child(4) {
        animation-delay: 0.3s;
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="header">
        <h1>2026 工作日看板</h1>
        <p class="subtitle" id="date-subtitle"></p>
      </div>

      <div class="stats-grid">
        <div class="card">
          <div class="list-title">
            <span id="month-title">--月</span><span>MONTH</span>
          </div>
          <div class="list-item">
            <span>已完成</span
            ><span class="val" style="color: var(--blue)" id="m-pass">0</span>
          </div>
          <div class="list-item">
            <span>待搬砖</span><span class="val" id="m-rem">0</span>
          </div>
        </div>
        <div class="card">
          <div class="list-title"><span>2026 全年</span><span>YEAR</span></div>
          <div class="list-item">
            <span>已完成</span
            ><span class="val" style="color: var(--blue)" id="y-pass">0</span>
          </div>
          <div class="list-item">
            <span>待搬砖</span><span class="val" id="y-rem">0</span>
          </div>
        </div>
      </div>

      <div class="card progress-section">
        <div class="progress-group">
          <div class="progress-header">
            <span>月度收益进度</span><span id="m-prog-txt">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="m-prog-bar"></div>
          </div>
        </div>
        <div class="progress-group">
          <div class="progress-header">
            <span>年度搬砖里程</span><span id="y-prog-txt">0%</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="y-prog-bar"></div>
          </div>
        </div>
      </div>

      <div class="card calendar-section">
        <div class="cal-controls">
          <button onclick="changeMonth(-1)"><b>&lt;</b></button>
          <span id="cal-lbl">2026年 --月</span>
          <button onclick="changeMonth(1)"><b>&gt;</b></button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>
    </div>

    <script>
      const DATA = {
        h: {
          "2026-01-01": "元旦",
          "2026-01-02": "元旦",
          "2026-01-03": "元旦",
          "2026-02-15": "春节",
          "2026-02-16": "春节",
          "2026-02-17": "春节",
          "2026-02-18": "春节",
          "2026-02-19": "春节",
          "2026-02-20": "春节",
          "2026-02-21": "春节",
          "2026-02-22": "春节",
          "2026-02-23": "春节",
          "2026-04-04": "清明",
          "2026-04-05": "清明",
          "2026-04-06": "清明",
          "2026-05-01": "五一",
          "2026-05-02": "五一",
          "2026-05-03": "五一",
          "2026-05-04": "五一",
          "2026-05-05": "五一",
          "2026-06-19": "端午",
          "2026-06-20": "端午",
          "2026-06-21": "端午",
          "2026-09-25": "中秋",
          "2026-09-26": "中秋",
          "2026-09-27": "中秋",
          "2026-10-01": "国庆",
          "2026-10-02": "国庆",
          "2026-10-03": "国庆",
          "2026-10-04": "国庆",
          "2026-10-05": "国庆",
          "2026-10-06": "国庆",
          "2026-10-07": "国庆",
        },
        w: new Set([
          "2026-01-04",
          "2026-02-14",
          "2026-02-28",
          "2026-04-26",
          "2026-05-10",
          "2026-09-20",
          "2026-09-28",
          "2026-10-10",
        ]),
      };

      const sysT = new Date();
      // 固定为2026年，如果现在就是2026年则用实际日期，否则模拟一个日期
      const t = sysT.getFullYear() === 2026 ? sysT : new Date(2026, 1, 28);
      let viewM = t.getMonth();

      const fmt = (d) =>
        `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;

      function isWork(date) {
        const s = fmt(date);
        if (DATA.w.has(s)) return true;
        if (DATA.h[s]) return false;
        const d = date.getDay();
        return d > 0 && d < 6;
      }

      function calc() {
        let yp = 0,
          yt = 0,
          mp = 0,
          mt = 0;
        const s = new Date(2026, 0, 1),
          e = new Date(2026, 11, 31);

        for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
          const w = isWork(d);
          if (w) {
            yt++;
            if (d <= t) yp++;
            if (d.getMonth() === t.getMonth()) {
              mt++;
              if (d <= t) mp++;
            }
          }
        }

        document.getElementById("y-pass").innerText = yp;
        document.getElementById("y-rem").innerText = yt - yp;
        document.getElementById("m-pass").innerText = mp;
        document.getElementById("m-rem").innerText = mt - mp;
        document.getElementById("month-title").innerText =
          `${t.getMonth() + 1}月`;

        const yPct = ((yp / yt) * 100).toFixed(1);
        const mPct = ((mp / mt) * 100).toFixed(1);
        document.getElementById("y-prog-txt").innerText = yPct + "%";
        document.getElementById("m-prog-txt").innerText = mPct + "%";

        setTimeout(() => {
          document.getElementById("y-prog-bar").style.width = yPct + "%";
          document.getElementById("m-prog-bar").style.width = mPct + "%";
        }, 300);

        const tWork = isWork(t);
        const tag = tWork
          ? `<span class="status-badge status-work">搬砖中</span>`
          : `<span class="status-badge status-rest">回血中</span>`;
        document.getElementById("date-subtitle").innerHTML =
          `${t.getFullYear()}年${t.getMonth() + 1}月${t.getDate()}日 星期${["日", "一", "二", "三", "四", "五", "六"][t.getDay()]} ${tag}`;
      }

      function buildCal(y, m) {
        const grid = document.getElementById("cal-grid");
        grid.innerHTML = "";
        document.getElementById("cal-lbl").innerText = `${y}年 ${m + 1}月`;

        ["日", "一", "二", "三", "四", "五", "六"].forEach((txt) => {
          const di = document.createElement("div");
          di.className = "cal-lbl";
          di.innerText = txt;
          grid.appendChild(di);
        });

        const firstD = new Date(y, m, 1).getDay();
        const days = new Date(y, m + 1, 0).getDate();
        const todayStr = fmt(t);

        for (let i = 0; i < firstD; i++) {
          grid.appendChild(
            Object.assign(document.createElement("div"), {
              className: "cal-day empty",
            }),
          );
        }

        let wCnt = 0;
        for (let day = 1; day <= days; day++) {
          const date = new Date(y, m, day);
          const str = fmt(date);
          const work = isWork(date);
          const holidayName = DATA.h[str];
          if (work) wCnt++;

          const di = document.createElement("div");
          di.className = "cal-day";
          if (str === todayStr) di.classList.add("day-today");
          else if (holidayName) di.classList.add("day-holiday");
          else if (!work) di.classList.add("day-rest");
          else di.classList.add("day-work");

          di.innerHTML = `<span class="day-num">${day}</span>`;
          if (work) di.innerHTML += `<span class="badge">W${wCnt}</span>`;
          if (holidayName)
            di.innerHTML += `<span class="holiday-name">${holidayName}</span>`;

          grid.appendChild(di);
        }
      }

      function changeMonth(d) {
        viewM += d;
        if (viewM > 11) viewM = 0;
        else if (viewM < 0) viewM = 11;
        buildCal(2026, viewM);
      }

      calc();
      buildCal(2026, viewM);
    </script>
  </body>
</html>
