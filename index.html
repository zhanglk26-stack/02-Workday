<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>2026 工作日看板 - Contrast</title>
      calc(); buildCal(2026, viewM); updateHolidays(); switchView("dashboard");
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
      calc(); buildCal(2026, viewM); updateHolidays(); switchView("dashboard");
    <script src="workday.js"></script>
    <style>
      :root {
        --bg-color: #f0f2f5;
        --card-bg: #ffffff;
        --text-main: #1a1a1a;
        --text-sec: #666666;
        --primary: #0066ff;
        --primary-light: rgba(0, 102, 255, 0.1);
        --success: #28a745;
        --danger: #dc3545;
        --warning: #ffc107;
        --border: #e1e4e8;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        --radius: 16px;
      }

      [data-theme="dark"] {
        --bg-color: #121212;
        --card-bg: #1e1e1e;
        --text-main: #e0e0e0;
        --text-sec: #a0a0a0;
        --primary: #3391ff;
        --primary-light: rgba(51, 145, 255, 0.15);
        --border: #333333;
        --shadow: 0 4px 12px rgba(0, 0, 0, 0.3);
      }

      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

      body {
        font-family: "PingFang SC", -apple-system, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        line-height: 1.5;
        transition: background-color 0.3s;
        padding-bottom: 40px;
        font-size: 18px;
      }

      .app-wrapper {
        max-width: 1200px;
        margin: 0 auto;
        padding: 12px;
      }

      @media (min-width: 600px) {
        .app-wrapper { padding: 20px; }
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }

      .brand { display: flex; align-items: center; gap: 8px; }
      .brand i { font-size: 32px; color: var(--primary); }
      .brand h1 { font-size: 24px; font-weight: 600; }

      .theme-toggle {
        width: 48px; height: 48px; border-radius: 50%;
        border: 1px solid var(--border); background: var(--card-bg);
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; color: var(--text-main); font-size: 24px;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 16px;
      }

      @media (min-width: 1200px) {
        .app-wrapper {
          max-width: 1880px;
          height: 100vh;
          max-height: 950px;
          overflow: hidden;
          padding: 20px;
          display: flex;
          flex-direction: column;
        }
        .dashboard-grid {
          grid-template-columns: 340px 1fr;
          gap: 24px;
          flex: 1;
          min-height: 0;
        }
        .sidebar {
          display: flex;
          flex-direction: column;
          gap: 16px;
          overflow-y: auto;
          padding-right: 8px;
          height: 100%;
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        .sidebar header { display: flex !important; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .sidebar header .brand h1 { font-size: 20px; }
        .sidebar .card { padding: 20px; }
        .app-wrapper > header { display: none; }
        .cal-day { font-size: 20px; aspect-ratio: auto; height: 100px; padding: 10px; }
        .badge { font-size: 13px; }
        .section-title { font-size: 18px; margin-bottom: 12px; }
        .tip-card { padding: 12px; }
        .dashboard-grid > .card { height: 100%; display: flex; flex-direction: column; }
        .cal-grid { flex: 1; align-content: start; }
        .progress-item { margin-bottom: 12px; }
        .counter-grid { margin-top: 12px; padding-top: 12px; }
      }

      @media (max-width: 1199px) {
        .sidebar header { display: none; }
        @media (min-width: 900px) {
          .dashboard-grid {
            grid-template-columns: 1.6fr 1fr;
            gap: 24px;
          }
        }
      }

      .card {
        background: var(--card-bg);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        border: 1px solid var(--border);
        height: auto;
      }

      @media (max-width: 1199px) { .card { height: fit-content !important; } }

      @media (min-width: 600px) {
        .card { padding: 32px; }
      }

      .section-title {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 20px;
      }
      .section-title i { color: var(--primary); font-size: 24px; }

      /* Calendar Styles */
      .cal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .cal-nav { display: flex; gap: 12px; }
      .cal-nav button {
        background: var(--bg-color); border: none; width: 44px; height: 44px;
        border-radius: 50%; cursor: pointer; color: var(--primary); font-size: 20px;
        display: flex; align-items: center; justify-content: center;
      }
      #cal-lbl-text { font-size: 22px; font-weight: 600; }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, 1fr);
        gap: 6px;
      }
      @media (min-width: 600px) {
        .cal-grid { gap: 12px; }
      }

      .cal-lbl { text-align: center; color: var(--text-sec); font-size: 16px; padding-bottom: 12px; font-weight: 600; }

      .cal-day {
        aspect-ratio: 1; border-radius: 12px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; position: relative;
        background: var(--bg-color); cursor: pointer; transition: 0.2s;
        font-size: 18px;
      }
      @media (min-width: 600px) {
        .cal-day { border-radius: 16px; font-size: 22px; }
      }

      .cal-day:hover { background: var(--primary-light); }
      .day-rest, .day-holiday { color: var(--danger); }
      .day-muted { opacity: 0.25; cursor: default; }

      .day-w6 { background: #fff7e6 !important; border: 2px solid #ffa940 !important; }
      [data-theme="dark"] .day-w6 { background: #2b2111 !important; border-color: #d48806 !important; }
      .day-w15 { background: #e6f7ff !important; border: 2px solid #40a9ff !important; }
      [data-theme="dark"] .day-w15 { background: #111d2c !important; border-color: #096dd9 !important; }

      .day-today { background: var(--primary) !important; color: white !important; font-weight: bold; border: 2px solid var(--primary) !important; }
      .badge { font-size: 12px; opacity: 0.8; margin-top: 2px; font-weight: 600; }
      @media (min-width: 600px) {
        .badge { font-size: 14px; margin-top: 4px; }
      }

      .holiday-name { position: absolute; top: 4px; right: 4px; font-size: 10px; font-weight: bold; }
      @media (min-width: 600px) {
        .holiday-name { top: 6px; right: 8px; font-size: 12px; }
      }

      .note-dot {
        position: absolute; bottom: 4px; width: 6px; height: 6px;
        border-radius: 50%; background: var(--primary);
      }

      /* Stats & Progress */
      .stats-container { display: flex; flex-direction: column; gap: 16px; }
      
      .progress-item { margin-bottom: 20px; }
      .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
      .progress-bar { height: 12px; background: var(--bg-color); border-radius: 6px; overflow: hidden; }
      .progress-fill { height: 100%; background: var(--primary); width: 0; transition: width 1s; }
      .progress-fill.success { background: var(--success); }

      .summary-text { font-size: 15px; color: var(--text-sec); margin-top: 8px; }

      .counter-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
      }
      .counter-item { display: flex; flex-direction: column; gap: 4px; }
      .counter-item .label { font-size: 14px; color: var(--text-sec); text-transform: uppercase; }
      .counter-item .val { font-size: 22px; font-weight: 700; color: var(--text-main); }

      /* Holiday Cards */
      .tip-card {
        border-left: 6px solid var(--primary);
        padding: 16px; background: var(--primary-light);
        border-radius: 12px; margin-bottom: 16px;
      }
      .tip-title { font-weight: 600; font-size: 18px; margin-bottom: 4px; display: flex; justify-content: space-between; }
      .tip-desc { font-size: 15px; color: var(--text-sec); line-height: 1.5; }
      .countdown-tag { font-size: 14px; color: var(--primary); font-weight: 600; }

      /* Modal */
      .modal-overlay {
        position: fixed; inset: 0; background: rgba(0,0,0,0.5);
        display: none; align-items: center; justify-content: center; z-index: 1000;
        padding: 20px;
      }
      .modal-card {
        background: var(--card-bg); padding: 24px; border-radius: var(--radius);
        width: 100%; max-width: 400px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      }
      .modal-card h2 { font-size: 22px; margin-bottom: 16px; }
      .modal-card textarea {
        width: 100%; height: 160px; padding: 16px; border: 1px solid var(--border);
        border-radius: 12px; margin-bottom: 20px; background: var(--bg-color); color: var(--text-main);
        font-family: inherit; font-size: 18px; outline: none; resize: none;
      }
      .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }
      .btn { padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; font-size: 16px; }
      .btn-primary { background: var(--primary); color: white; }
      .btn-ghost { background: transparent; color: var(--text-sec); }

    </style>
    <style>
      .nav-links { display: flex; gap: 16px; margin-left: 24px; }
      .btn-nav { background: none; border: none; font-size: 18px; color: var(--text-sec); cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: 0.2s; }
      .btn-nav:hover { background: var(--primary-light); color: var(--primary); }
      .btn-nav.active { color: var(--primary); font-weight: 600; background: var(--primary-light); }

      #todo-view { display: none; }
      #dashboard-view { display: block; }
      .todo-container { display: grid; grid-template-columns: 80px 1fr 300px; gap: 24px; height: calc(100vh - 160px); min-height: 600px; }

      .todo-sidebar { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding: 20px 0; gap: 24px; }
      .side-btn { width: 48px; height: 48px; border-radius: 12px; border: none; background: transparent; color: var(--text-sec); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
      .side-btn:hover { background: var(--primary-light); color: var(--primary); }
      .side-btn.active { background: var(--primary); color: white; }

      .todo-main { display: flex; flex-direction: column; gap: 16px; overflow-y: auto; padding-right: 8px; }
      .todo-card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; transition: 0.2s; }
      .todo-card.today { border: 2px solid var(--primary); }
      .todo-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
      .todo-date { font-weight: 600; font-size: 18px; }
      .todo-day-type { font-size: 14px; padding: 4px 8px; border-radius: 6px; font-weight: 600; }
      .type-work { background: #fff7e6; color: #d48806; }
      .type-rest { background: #fff1f0; color: #cf1322; }
      .todo-textarea { width: 100%; border: none; background: var(--bg-color); border-radius: 12px; padding: 12px; font-size: 16px; font-family: inherit; resize: none; min-height: 80px; color: var(--text-main); }
      .todo-textarea:focus { outline: 1px solid var(--primary); }

      .todo-mini-cal { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; height: fit-content; }
      .mini-cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
      .mini-cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
      .mini-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 14px; border-radius: 6px; cursor: pointer; }
      .mini-day:hover { background: var(--primary-light); }
      .mini-day.selected { background: var(--primary); color: white; }
      .mini-day.today { text-decoration: underline; font-weight: bold; }
      .mini-day.muted { opacity: 0.3; }

      @media (max-width: 900px) {
        .todo-container { grid-template-columns: 1fr; height: auto; }
        .todo-sidebar { flex-direction: row; width: 100%; justify-content: space-around; padding: 12px; order: -1; }
        .todo-mini-cal { display: none; }
      }
    </style>
  </head>
  <body>
        <div class="app-wrapper">
      <header>

        <div class="brand">
          <i class="ph-fill ph-calendar-check"></i>
          <h1>2026 工作日看板</h1>
        </div>
        <nav class="nav-links"><button class="btn-nav active" onclick="switchView('dashboard')">仪表盘</button><button class="btn-nav" onclick="switchView('todo')">备忘录</button></nav>
        <button class="theme-toggle" onclick="toggleTheme()">
          <i id="theme-icon" class="ph ph-sun"></i>
        </button>

      </header>

      <div class="dashboard-grid">
        <aside class="sidebar">
          <header>

        <div class="brand">
          <i class="ph-fill ph-calendar-check"></i>
          <h1>2026 工作日看板</h1>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">
          <i id="theme-icon-side" class="ph ph-sun"></i>
        </button>

          </header>
          <div class="stats-container">
          <section class="card">
            <div class="section-title"><i class="ph-fill ph-chart-line-up"></i> 工作进度</div>

            <div class="progress-item">
              <div class="progress-label">
                <span>本月进度</span>
                <span id="m-prog-txt">0%</span>
              </div>
              <div class="progress-bar">
                <div id="m-prog-bar" class="progress-fill"></div>
              </div>
        </aside>
        <section class="card">
          <div class="cal-header">
            <span id="cal-lbl-text">2026年 1月</span>
            <div class="cal-nav">
              <button onclick="changeMonth(-1)"><i class="ph ph-caret-left"></i></button>
              <button onclick="changeMonth(1)"><i class="ph ph-caret-right"></i></button>
            </div>
          </div>
          <div class="cal-grid" id="cal-grid"></div>
        </section>
      </div>
    </div>

      <div id="todo-view">
        <div class="todo-container">
          <aside class="todo-sidebar">
            <button class="side-btn active" onclick="setTodoFilter('today')" title="今日"><i class="ph-fill ph-calendar-star"></i></button>
            <button class="side-btn" onclick="setTodoFilter('all')" title="全部"><i class="ph-fill ph-list-bullets"></i></button>
            <button class="side-btn" onclick="setTodoFilter('month')" title="本月"><i class="ph-fill ph-calendar"></i></button>
          </aside>

          <main class="todo-main" id="todo-list">
            <!-- Todo cards will be injected here -->
          </main>

          <aside class="todo-mini-cal">
            <div class="mini-cal-header">
              <span id="mini-cal-lbl" style="font-weight:600">2026年1月</span>
              <div style="display:flex; gap:8px">
                <i class="ph ph-caret-left" onclick="changeMiniMonth(-1)" style="cursor:pointer"></i>
                <i class="ph ph-caret-right" onclick="changeMiniMonth(1)" style="cursor:pointer"></i>
              </div>
            </div>
            <div class="mini-cal-grid" id="mini-cal-grid">
              <!-- Mini cal days here -->
            </div>
          </aside>
        </div>
      </div>
    <div class="modal-overlay" id="note-modal">
      <div class="modal-card">
        <h2 id="modal-date-title">日程备注</h2>
        <textarea id="note-input" placeholder="写点什么..."></textarea>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="closeModal()">取消</button>
          <button class="btn btn-primary" onclick="saveNote()">保存</button>
        </div>
      </div>
    </div>

    <script>
      const sysT = new Date();
      const t = sysT.getFullYear() === 2026 ? sysT : new Date(2026, 0, 5);
      let viewM = t.getMonth();
      let notes = JSON.parse(localStorage.getItem('workday_notes') || '{}');
      let selectedDate = null;

      function calc() {
        let yp = 0, yt = 0, mp = 0, mt = 0, hp = 0, hr = 0;
        const s = new Date(2026, 0, 1), e = new Date(2026, 11, 31);
        for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
          const w = isWork(d);
          if (w) {
            yt++;
            if (d <= t) yp++;
            if (d.getMonth() === t.getMonth()) {
              mt++;
              if (d <= t) mp++;
            }
          }
          const strD = fmt(d);
          if (DATA.h[strD] && d.getDay() !== 0 && d.getDay() !== 6) {
            if (d <= t) hp++;
            else hr++;
          }
        }
        const yPct = ((yp / yt) * 100).toFixed(1);
        const mPct = ((mp / mt) * 100).toFixed(1);

        document.getElementById("m-prog-txt").innerText = mPct + "%";
        document.getElementById("m-prog-bar").style.width = mPct + "%";
        document.getElementById("m-summary").innerText = `已工作 ${mp} 天，剩余 ${mt - mp} 天`;

        document.getElementById("y-prog-txt").innerText = yPct + "%";
        document.getElementById("y-prog-bar").style.width = yPct + "%";
        const yDaysPast = Math.floor((t - (new Date(2026, 0, 1))) / 86400000) + 1;
        document.getElementById("y-summary").innerText = `2026年已过去 ${yDaysPast} 天`;

        document.getElementById("h-pass").innerText = hp;
        document.getElementById("h-rem").innerText = hr;

      }

      function updateHolidays() {
        const list = document.getElementById("holiday-list");
        list.innerHTML = "";
        const holidays = [];
        const sortedDates = Object.keys(DATA.h).sort();

        let currentRange = null;
        for (const dateStr of sortedDates) {
          const date = new Date(dateStr);
          const name = DATA.h[dateStr];

          if (currentRange && currentRange.name === name &&
              (date - currentRange.end) <= 86400000 * 1.5) {
            currentRange.end = date;
          } else {
            currentRange = { name, start: date, end: date };
            holidays.push(currentRange);
          }
        }

        holidays.forEach(h => {
          if (h.end < t && fmt(h.end) !== fmt(t)) return;

          let workdaysUntil = 0;
          if (h.start > t) {
            let d = new Date(t);
            d.setDate(d.getDate() + 1);
            while (d < h.start) {
              if (isWork(d)) workdaysUntil++;
              d.setDate(d.getDate() + 1);
            }
          }

          const card = document.createElement("div");
          card.className = "tip-card";

          const title = document.createElement("div");
          title.className = "tip-title";
          const statusTxt = h.start > t ? `待搬砖: ${workdaysUntil}天` : "进行中";
          title.innerHTML = `<span>${h.name}</span> <span class="countdown-tag">${statusTxt}</span>`;

          const desc = document.createElement("div");
          desc.className = "tip-desc";
          const startStr = (h.start.getMonth() + 1) + "月" + h.start.getDate() + "日";
          const endStr = (h.end.getMonth() + 1) + "月" + h.end.getDate() + "日";
          desc.innerText = startStr === endStr ? startStr : `${startStr} 至 ${endStr}`;

          card.appendChild(title);
          card.appendChild(desc);
          list.appendChild(card);
        });
      }
      function buildCal(y, m) {
        const grid = document.getElementById("cal-grid");
        grid.innerHTML = "";
        document.getElementById("cal-lbl-text").innerText = `${y}年 ${m + 1}月`;

        ["日", "一", "二", "三", "四", "五", "六"].forEach(txt => {
          const di = document.createElement("div"); di.className = "cal-lbl"; di.innerText = txt; grid.appendChild(di);
        });

        const firstD = new Date(y, m, 1).getDay();
        const daysInM = new Date(y, m + 1, 0).getDate();
        const prevM_daysInM = new Date(y, m, 0).getDate();
        const todayStr = fmt(t);

        for (let i = firstD - 1; i >= 0; i--) {
          const day = prevM_daysInM - i;
          const di = document.createElement("div");
          di.className = "cal-day day-muted";
          const span = document.createElement("span");
          span.className = "day-num";
          span.innerText = day;
          di.appendChild(span);
          grid.appendChild(di);
        }

        let wCnt = 0;
        for (let day = 1; day <= daysInM; day++) {
          const date = new Date(y, m, day), str = fmt(date), work = isWork(date), holidayName = DATA.h[str];
          if (work) wCnt++;
          const di = document.createElement("div"); di.className = "cal-day";
          if (work && (wCnt === 6 || wCnt === 15)) di.classList.add(wCnt === 6 ? "day-w6" : "day-w15");
          if (str === todayStr) di.classList.add("day-today");
          if (holidayName) di.classList.add("day-holiday");
          else if (!work) di.classList.add("day-rest");

          const num = document.createElement("span");
          num.className = "day-num";
          num.innerText = day;
          di.appendChild(num);

          if (work) {
            const badge = document.createElement("span");
            badge.className = "badge";
            badge.innerText = `W${wCnt}`;
            di.appendChild(badge);
          }

          if (holidayName) {
            const hName = document.createElement("span");
            hName.className = "holiday-name";
            hName.innerText = holidayName;
            di.appendChild(hName);
          }

          if (notes[str]) {
            const dot = document.createElement("div");
            dot.className = "note-dot";
            di.appendChild(dot);
          }

          di.onclick = () => openModal(str);
          grid.appendChild(di);
        }

        const totalCells = firstD + daysInM;
        const lastRowExtra = (7 - (totalCells % 7)) % 7;
        for (let day = 1; day <= lastRowExtra; day++) {
          const di = document.createElement("div");
          di.className = "cal-day day-muted";
          const span = document.createElement("span");
          span.className = "day-num";
          span.innerText = day;
          di.appendChild(span);
          grid.appendChild(di);
        }
      }

      function openModal(dateStr) {
        selectedDate = dateStr;
        document.getElementById("modal-date-title").innerText = `${dateStr} 日程备注`;
        document.getElementById("note-input").value = notes[dateStr] || "";
        document.getElementById("note-modal").style.display = "flex";
        setTimeout(() => document.getElementById("note-input").focus(), 100);
      }
      function closeModal() { document.getElementById("note-modal").style.display = "none"; }
      function saveNote() {
        const val = document.getElementById("note-input").value.trim();
        if (val) notes[selectedDate] = val; else delete notes[selectedDate];
        localStorage.setItem('workday_notes', JSON.stringify(notes));
        buildCal(2026, viewM); updateHolidays(); switchView("dashboard"); closeModal();
      }

      function toggleTheme() {
        const body = document.body;
        const icons = document.querySelectorAll("[id^=theme-icon]");
        if (body.getAttribute("data-theme") === "dark") {
          body.removeAttribute("data-theme");
          icons.forEach(i => i.className = "ph ph-sun");
          localStorage.setItem('theme', 'light');
        } else {
          body.setAttribute("data-theme", "dark");
          icons.forEach(i => i.className = "ph ph-moon");
          localStorage.setItem('theme', 'dark');
        }
      }

      function changeMonth(d) {
        viewM += d;
        if (viewM > 11) viewM = 0; else if (viewM < 0) viewM = 11;
        buildCal(2026, viewM);
      }

      // Initial Theme
      if (localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute("data-theme", "dark");
        document.querySelectorAll("[id^=theme-icon]").forEach(i => i.className = "ph ph-moon");
      }


      let todoFilter = 'all'; // 'today', 'all', 'month'
      let miniViewM = t.getMonth();
      let selectedTodoDate = fmt(t);

      function switchView(view) {
        document.getElementById('dashboard-view').style.display = view === 'dashboard' ? 'grid' : 'none';
        document.getElementById('todo-view').style.display = view === 'todo' ? 'block' : 'none';

        document.querySelectorAll('.btn-nav').forEach(btn => {
          btn.classList.toggle('active', (view === 'dashboard' && btn.innerText === '仪表盘') || (view === 'todo' && btn.innerText === '备忘录'));
        });

        if (view === 'todo') {
          renderTodoList();
          renderMiniCal(2026, miniViewM);
        }
      }

      function setTodoFilter(filter) {
        todoFilter = filter;
        document.querySelectorAll('.side-btn').forEach((btn, idx) => {
          const filters = ['today', 'all', 'month'];
          btn.classList.toggle('active', filters[idx] === filter);
        });
        renderTodoList();
      }

      function renderTodoList() {
        const list = document.getElementById('todo-list');
        list.innerHTML = '';

        let targetDates = [];
        const todayStr = fmt(t);

        if (todoFilter === 'today') {
          targetDates = [todayStr];
        } else {
          // Show the whole month for 'all' and 'month' but maybe scrolling is better
          const daysInM = new Date(2026, miniViewM + 1, 0).getDate();
          for(let d=1; d<=daysInM; d++) {
            targetDates.push(fmt(new Date(2026, miniViewM, d)));
          }
        }

        targetDates.forEach(dateStr => {
          const date = new Date(dateStr);
          const isToday = dateStr === todayStr;
          const work = isWork(date);
          const hName = DATA.h[dateStr];

          const card = document.createElement('div');
          card.className = `todo-card ${isToday ? 'today' : ''}`;
          card.id = `todo-card-${dateStr}`;

          const header = document.createElement('div');
          header.className = 'todo-card-header';

          const dateTitle = document.createElement('div');
          dateTitle.className = 'todo-date';
          dateTitle.innerText = `${dateStr} ${['日','一','二','三','四','五','六'][date.getDay()]}`;

          const typeTag = document.createElement('span');
          typeTag.className = `todo-day-type ${work ? 'type-work' : 'type-rest'}`;
          typeTag.innerText = hName || (work ? '工作日' : '休息日');

          header.appendChild(dateTitle);
          header.appendChild(typeTag);

          const textarea = document.createElement('textarea');
          textarea.className = 'todo-textarea';
          textarea.placeholder = '今日备忘...';
          textarea.value = notes[dateStr] || '';
          textarea.oninput = (e) => {
            const val = e.target.value;
            if (val.trim()) notes[dateStr] = val; else delete notes[dateStr];
            localStorage.setItem('workday_notes', JSON.stringify(notes));
            buildCal(2026, viewM);
            updateHolidays();
          };

          card.appendChild(header);
          card.appendChild(textarea);
          list.appendChild(card);
        });

        const targetId = todoFilter === 'today' ? `todo-card-${todayStr}` : `todo-card-${selectedTodoDate}`;
        const scrollTarget = document.getElementById(targetId);
        if (scrollTarget) scrollTarget.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }

      function renderMiniCal(y, m) {
        const grid = document.getElementById('mini-cal-grid');
        grid.innerHTML = '';
        document.getElementById('mini-cal-lbl').innerText = `${y}年 ${m + 1}月`;

        ['日', '一', '二', '三', '四', '五', '六'].forEach(txt => {
          const d = document.createElement('div');
          d.className = 'mini-day muted';
          d.style.fontSize = '12px';
          d.innerText = txt;
          grid.appendChild(d);
        });

        const firstD = new Date(y, m, 1).getDay();
        const daysInM = new Date(y, m + 1, 0).getDate();
        const todayStr = fmt(t);

        for (let i = 0; i < firstD; i++) {
          const d = document.createElement('div');
          d.className = 'mini-day muted';
          grid.appendChild(d);
        }

        for (let day = 1; day <= daysInM; day++) {
          const date = new Date(y, m, day);
          const str = fmt(date);
          const di = document.createElement('div');
          di.className = 'mini-day';
          if (str === todayStr) di.classList.add('today');
          if (str === selectedTodoDate) di.classList.add('selected');
          if (notes[str]) di.style.fontWeight = '900';

          di.innerText = day;
          di.onclick = () => {
            selectedTodoDate = str;
            if (todoFilter === 'today') setTodoFilter('all');
            renderMiniCal(y, m);
            renderTodoList();
          };
          grid.appendChild(di);
        }
      }

      function changeMiniMonth(d) {
        miniViewM += d;
        if (miniViewM > 11) miniViewM = 0; else if (miniViewM < 0) miniViewM = 11;
        renderMiniCal(2026, miniViewM);
        if (todoFilter !== 'today') renderTodoList();
      }
      calc(); buildCal(2026, viewM); updateHolidays(); switchView("dashboard");
    </script>
  </body>
</html>
