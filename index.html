  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>2026 工作日看板</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="workday.js"></script>
    <style>
      :root {
        --bg-color: #f8f9ff;
        --card-bg: rgba(255, 255, 255, 0.7);
        --text-main: #1d1d1f;
        --text-sec: #86868b;
        --blue: #0071e3;
        --blue-grad: linear-gradient(135deg, #0071e3, #40a9ff);
        --red: #ff3b30;
        --green: #34c759;
        --border: rgba(0, 0, 0, 0.05);
        --glass-border: rgba(255, 255, 255, 0.4);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
        --dot-color: #0071e3;
        
        /* Standardized Typography Tokens - Increased for Elderly Friendliness */
        --fs-sm: 16px;
        --fs-md: 20px;
        --fs-lg: 32px;
        --fw-reg: 400;
        --fw-bold: 700;
      }

      [data-theme="dark"] {
        --bg-color: #000000;
        --card-bg: rgba(28, 28, 30, 0.7);
        --text-main: #f5f5f7;
        --text-sec: #8e8e93;
        --blue: #0a84ff;
        --blue-grad: linear-gradient(135deg, #0a84ff, #5ac8fa);
        --red: #ff453a;
        --green: #32d74b;
        --border: rgba(255, 255, 255, 0.1);
        --glass-border: rgba(255, 255, 255, 0.1);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --dot-color: #0a84ff;
      }

      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "PingFang SC", -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
        background-color: var(--bg-color);
        background-image: radial-gradient(circle at top right, var(--blue), transparent 400px);
        background-attachment: fixed;
        color: var(--text-main);
        font-size: var(--fs-md);
        font-weight: var(--fw-reg);
        margin: 0;
        padding: 16px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
        overflow-x: hidden;
        transition: background-color 0.5s ease;
      }

      .app-container {
        width: 100%;
        max-width: none; /* Full width as requested */
        display: flex;
        flex-direction: column;
        gap: 8px; /* Reduced from 24px */
        z-index: 10;
        padding-bottom: 32px;
        margin: 0;
      }

      .content-wrapper {
        display: flex;
        flex-direction: column;
        gap: 16px;
        width: 100%;
      }

      .stats-col {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .card {
        background-color: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border-radius: 20px;
        padding: 18px;
        border: 1px solid var(--glass-border);
        box-shadow: var(--shadow);
        transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s, background-color 0.3s;
      }

      .card:hover {
        transform: translateY(-2px);
      }

      .card:active {
        transform: scale(0.98);
      }

      .header {
        display: flex;
        flex-direction: column; /* Stacks on mobile by default */
        align-items: center;
        margin-bottom: 8px; /* Reduced from 24px */
        padding: 0 8px;
        gap: 16px;
        position: relative;
        text-align: center;
      }
      @media (min-width: 800px) {
        .header {
          flex-direction: row; /* Single line on desktop */
          justify-content: space-between;
        }
      }
      .header h1 {
        font-size: 24px;
        font-weight: var(--fw-bold);
        margin: 0;
        letter-spacing: -0.5px;
        white-space: nowrap;
      }
      .header .subtitle {
        font-size: 20px;
        color: var(--text-main);
        margin: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        font-weight: var(--fw-bold);
      }

      .theme-toggle {
        background: var(--card-bg);
        border: 1px solid var(--glass-border);
        color: var(--text-main);
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(10px);
        font-size: 24px;
        flex-shrink: 0;
      }

      .status-badge {
        padding: 4px 10px;
        border-radius: 20px;
        font-size: var(--fs-sm);
        font-weight: var(--fw-bold);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      }
      .status-work { background: var(--blue-grad); color: white; }
      .status-rest { background: linear-gradient(135deg, #34c759, #a3e635); color: white; }

      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .list-title {
        font-size: var(--fs-sm);
        color: var(--text-sec);
        margin-bottom: 12px;
        font-weight: var(--fw-bold);
        display: flex;
        justify-content: space-between;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .list-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 6px 0;
        font-size: var(--fs-md);
      }
      .val {
        font-variant-numeric: tabular-nums;
        font-weight: var(--fw-bold);
        font-size: var(--fs-md);
      }

      .progress-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .progress-group { width: 100%; }
      .progress-header {
        display: flex;
        justify-content: space-between;
        font-size: var(--fs-sm);
        color: var(--text-sec);
        margin-bottom: 6px;
        font-weight: var(--fw-bold);
      }
      .progress-track {
        height: 6px;
        background-color: rgba(128, 128, 128, 0.1);
        border-radius: 3px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: var(--blue-grad);
        width: 0%;
        border-radius: 3px;
        transition: width 1.5s cubic-bezier(0.19, 1, 0.22, 1);
      }

      .calendar-section { padding: 16px; }
      .cal-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .cal-controls button {
        background: rgba(128, 128, 128, 0.1);
        border: none;
        color: var(--blue);
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.2s;
        font-size: 24px;
      }
      .cal-controls button:hover { background: rgba(128, 128, 128, 0.2); }
      .cal-controls span { font-size: 24px; font-weight: var(--fw-bold); }

      .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
      .cal-lbl { text-align: center; font-size: var(--fs-sm); color: var(--text-sec); font-weight: var(--fw-bold); padding-bottom: 8px; }

      .cal-day {
        aspect-ratio: 1;
        border-radius: 12px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
        font-size: 24px; /* Increased as requested */
        background: rgba(128, 128, 128, 0.05);
        cursor: pointer;
        transition: all 0.2s;
      }
      .cal-day:hover { transform: scale(1.1); z-index: 2; background: rgba(128, 128, 128, 0.15); }
      .cal-day.empty { background: none; cursor: default; }
      .cal-day.empty:hover { transform: none; }

      .day-holiday, .day-rest { color: var(--red); background-color: rgba(255, 59, 48, 0.1); }
      .day-work { color: var(--text-main); font-weight: var(--fw-reg); }
      .day-muted { color: var(--text-sec); opacity: 0.3; cursor: default; }
      .day-muted:hover { transform: none; background: rgba(128, 128, 128, 0.05); }
      .day-today {
        background: var(--blue-grad) !important;
        color: white !important;
        box-shadow: 0 4px 12px rgba(0, 113, 227, 0.3);
        transform: scale(1.1);
        z-index: 3;
      }

      .badge { font-size: 16px; font-weight: var(--fw-bold); margin-top: 4px; opacity: 0.8; }
      .holiday-name { position: absolute; top: 4px; right: 6px; font-size: 12px; font-weight: var(--fw-bold); }
      
      /* W6 and W15 Special Highlighting */
      .day-w6, .day-w15 {
        border: 3px solid var(--blue) !important;
        background-color: rgba(0, 113, 227, 0.05);
      }
      
      /* Note Display Styles */
      .day-note {
        width: 90%;
        font-size: 12px;
        color: var(--blue);
        text-align: center;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
        font-weight: var(--fw-bold);
      }

      @keyframes slideUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .app-container > * { animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .app-container > *:nth-child(2) { animation-delay: 0.1s; }
      .app-container > *:nth-child(3) { animation-delay: 0.2s; }

      /* Modal Styles */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.4);
        backdrop-filter: blur(4px);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
        padding: 20px;
      }
      .modal-card {
        background: var(--bg-color);
        width: 100%;
        max-width: 320px;
        border-radius: 24px;
        padding: 24px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        animation: slideUp 0.3s ease-out;
      }
      .modal-header { font-weight: var(--fw-bold); font-size: var(--fs-md); margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
      .modal-body textarea {
        width: 100%;
        height: 120px;
        background: rgba(128,128,128,0.1);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
        color: var(--text-main);
        font-family: inherit;
        font-size: var(--fs-md);
        resize: none;
        outline: none;
      }
      .modal-footer { display: flex; gap: 12px; margin-top: 16px; }
      .modal-footer button {
        flex: 1;
        padding: 12px;
        border-radius: 12px;
        border: none;
        font-weight: var(--fw-bold);
        cursor: pointer;
        transition: all 0.2s;
      }
      .btn-cancel { background: rgba(128,128,128,0.1); color: var(--text-main); }
      .btn-save { background: var(--blue-grad); color: white; }

      @media (min-width: 800px) {
        body { align-items: flex-start; }
        .app-container { max-width: none; }
        .content-wrapper { flex-direction: row; align-items: flex-start; }
        .calendar-col { flex: 1.6; display: flex; flex-direction: column; gap: 16px; }
        .stats-col { flex: 1; order: 1; } /* Stats and progress on the right */
        .cal-day { font-size: var(--fs-md); }
      }
    </style>
  </head>
  <body>
    <div class="app-container">
      <div class="header">
        <h1>2026 工作日看板</h1>
        <p class="subtitle" id="date-subtitle"></p>
        <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
          <i class="ph ph-sun" id="theme-icon"></i>
        </button>
      </div>

      <div class="content-wrapper">
        <div class="calendar-col">
          <div class="card calendar-section">
            <div class="cal-controls">
              <button onclick="changeMonth(-1)"><i class="ph-bold ph-caret-left"></i></button>
              <span id="cal-lbl" style="display: flex; align-items: center; gap: 6px">
                <i class="ph-bold ph-calendar-blank"></i> <span id="cal-lbl-text">2026年 --月</span>
              </span>
              <button onclick="changeMonth(1)"><i class="ph-bold ph-caret-right"></i></button>
            </div>
            <div class="cal-grid" id="cal-grid"></div>
          </div>
        </div>

        <div class="stats-col">
          <div class="card progress-section">
            <div class="progress-group">
              <div class="progress-header">
                <span><i class="ph ph-chart-line-up"></i> 月度搬砖进度</span><span id="m-prog-txt">0%</span>
              </div>
              <div class="progress-track"><div class="progress-fill" id="m-prog-bar"></div></div>
            </div>
            <div class="progress-group">
              <div class="progress-header">
                <span><i class="ph ph-map-trifold"></i> 年度搬砖进程</span><span id="y-prog-txt">0%</span>
              </div>
              <div class="progress-track"><div class="progress-fill" id="y-prog-bar"></div></div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="card">
              <div class="list-title">
                <span style="display: flex; align-items: center; gap: 4px">
                  <i class="ph ph-calendar-blank"></i> <span id="month-title">--月</span>
                </span>
                <span>Month</span>
              </div>
              <div class="list-item"><span>已完成</span><span class="val" style="color: var(--blue)" id="m-pass">0</span></div>
              <div class="list-item"><span>待搬砖</span><span class="val" id="m-rem">0</span></div>
            </div>
            <div class="card">
              <div class="list-title">
                <span style="display: flex; align-items: center; gap: 4px"><i class="ph ph-clock"></i> <span>2026 全年</span></span>
                <span>Year</span>
              </div>
              <div class="list-item"><span>已完成</span><span class="val" style="color: var(--blue)" id="y-pass">0</span></div>
              <div class="list-item"><span>待搬砖</span><span class="val" id="y-rem">0</span></div>
            </div>
          </div>

          <div class="stats-grid">
            <div class="card">
              <div class="list-title">
                <span style="display: flex; align-items: center; gap: 4px"><i class="ph ph-coffee"></i> <span>假期余额</span></span>
                <span>Holiday</span>
              </div>
              <div class="list-item"><span>已过</span><span class="val" style="color: var(--text-sec)" id="h-pass">0</span></div>
              <div class="list-item"><span>待休</span><span class="val" style="color: var(--green)" id="h-rem">0</span></div>
            </div>
            <div class="card">
              <div class="list-title">
                <span style="display: flex; align-items: center; gap: 4px"><i class="ph ph-lightbulb"></i> <span>拼假攻略</span></span>
                <span>Tips</span>
              </div>
              <div style="font-size: 11px; line-height: 1.6; color: var(--text-main);">
                <div style="margin-bottom: 2px"><b>春节：</b>请4休15</div>
                <div style="margin-bottom: 2px"><b>五一：</b>请4休9</div>
                <div><b>国庆：</b>请3休13</div>
              </div>
            </div>
          </div>
        </div>
      </div> <!-- End content-wrapper -->
    </div>

    <!-- Note Modal -->
    <div class="modal-overlay" id="note-modal">
      <div class="modal-card">
        <div class="modal-header" id="modal-date-title">备注日程</div>
        <div class="modal-body">
          <textarea id="note-input" placeholder="写点什么..."></textarea>
        </div>
        <div class="modal-footer">
          <button class="btn-cancel" onclick="closeModal()">取消</button>
          <button class="btn-save" onclick="saveNote()">保存</button>
        </div>
      </div>
    </div>

    <script>
      const sysT = new Date();
      const t = sysT.getFullYear() === 2026 ? sysT : new Date(2026, 2, 13);
      let viewM = t.getMonth();
      let selectedDate = null;
      let notes = JSON.parse(localStorage.getItem('workday_notes') || '{}');

      function calc() {
        let yp = 0, yt = 0, mp = 0, mt = 0, hp = 0, hr = 0;
        const s = new Date(2026, 0, 1), e = new Date(2026, 11, 31);
        for (let d = new Date(s); d <= e; d.setDate(d.getDate() + 1)) {
          const w = isWork(d);
          if (w) { yt++; if (d <= t) yp++; if (d.getMonth() === t.getMonth()) { mt++; if (d <= t) mp++; } }
          const strD = fmt(d);
          if (DATA.h[strD] && d.getDay() !== 0 && d.getDay() !== 6) { if (d <= t) hp++; else hr++; }
        }
        document.getElementById("y-pass").innerText = yp;
        document.getElementById("y-rem").innerText = yt - yp;
        document.getElementById("m-pass").innerText = mp;
        document.getElementById("m-rem").innerText = mt - mp;
        document.getElementById("h-pass").innerText = hp;
        document.getElementById("h-rem").innerText = hr;
        document.getElementById("month-title").innerText = `${t.getMonth() + 1}月`;
        const yPct = ((yp / yt) * 100).toFixed(1);
        const mPct = ((mp / mt) * 100).toFixed(1);
        document.getElementById("y-prog-txt").innerText = yPct + "%";
        document.getElementById("m-prog-txt").innerText = mPct + "%";
        setTimeout(() => {
          document.getElementById("y-prog-bar").style.width = yPct + "%";
          document.getElementById("m-prog-bar").style.width = mPct + "%";
        }, 300);
        const tag = isWork(t) ? `<span class="status-badge status-work">搬砖中</span>` : `<span class="status-badge status-rest">回血中</span>`;
        document.getElementById("date-subtitle").innerHTML = `${t.getFullYear()}年${t.getMonth() + 1}月${t.getDate()}日 星期${["日", "一", "二", "三", "四", "五", "六"][t.getDay()]} ${tag}`;
      }

      function buildCal(y, m) {
        const grid = document.getElementById("cal-grid");
        grid.innerHTML = "";
        document.getElementById("cal-lbl-text").innerText = `${y}年 ${m + 1}月`;
        ["日", "一", "二", "三", "四", "五", "六"].forEach(txt => {
          const di = document.createElement("div"); di.className = "cal-lbl"; di.innerText = txt; grid.appendChild(di);
        });

        const firstD = new Date(y, m, 1).getDay();
        const daysInM = new Date(y, m + 1, 0).getDate();
        const prevM_daysInM = new Date(y, m, 0).getDate();
        const todayStr = fmt(t);

        // Render previous month's trailing days
        for (let i = firstD - 1; i >= 0; i--) {
          const day = prevM_daysInM - i;
          const di = document.createElement("div");
          di.className = "cal-day day-muted";
          di.innerHTML = `<span class="day-num">${day}</span>`;
          grid.appendChild(di);
        }

        // Render current month's days
        let wCnt = 0;
        for (let day = 1; day <= daysInM; day++) {
          const date = new Date(y, m, day), str = fmt(date), work = isWork(date), holidayName = DATA.h[str];
          if (work) wCnt++;
          const di = document.createElement("div");
          di.className = "cal-day";
          if (str === todayStr) di.classList.add("day-today");
          else if (holidayName) di.classList.add("day-holiday");
          else if (!work) di.classList.add("day-rest");
          else di.classList.add("day-work");
          
          // Highlight W6 and W15
          if (work && (wCnt === 6 || wCnt === 15)) {
            di.classList.add(wCnt === 6 ? "day-w6" : "day-w15");
          }

          di.innerHTML = `<span class="day-num">${day}</span>`;
          if (work) di.innerHTML += `<span class="badge">W${wCnt}</span>`;
          if (holidayName) di.innerHTML += `<span class="holiday-name">${holidayName}</span>`;
          if (notes[str]) {
            const shortNote = notes[str].length > 5 ? notes[str].substring(0, 5) + "..." : notes[str];
            di.innerHTML += `<div class="day-note">${shortNote}</div>`;
            di.title = notes[str];
          }
          di.onclick = () => openModal(str);
          grid.appendChild(di);
        }

        // Render remaining days in the last week only to complete the row
        const totalCells = firstD + daysInM;
        const lastRowExtra = (7 - (totalCells % 7)) % 7;
        for (let day = 1; day <= lastRowExtra; day++) {
          const di = document.createElement("div");
          di.className = "cal-day day-muted";
          di.innerHTML = `<span class="day-num">${day}</span>`;
          grid.appendChild(di);
        }
      }

      function openModal(dateStr) {
        selectedDate = dateStr;
        document.getElementById("modal-date-title").innerText = `${dateStr} 日程备注`;
        document.getElementById("note-input").value = notes[dateStr] || "";
        document.getElementById("note-modal").style.display = "flex";
        document.getElementById("note-input").focus();
      }
      function closeModal() { document.getElementById("note-modal").style.display = "none"; }
      function saveNote() {
        const val = document.getElementById("note-input").value.trim();
        if (val) notes[selectedDate] = val; else delete notes[selectedDate];
        localStorage.setItem('workday_notes', JSON.stringify(notes));
        buildCal(2026, viewM);
        closeModal();
      }

      function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById("theme-icon");
        if (body.getAttribute("data-theme") === "dark") {
          body.removeAttribute("data-theme");
          icon.className = "ph ph-sun";
          localStorage.setItem('theme', 'light');
        } else {
          body.setAttribute("data-theme", "dark");
          icon.className = "ph ph-moon";
          localStorage.setItem('theme', 'dark');
        }
      }

      function changeMonth(d) {
        viewM += d;
        if (viewM > 11) viewM = 0; else if (viewM < 0) viewM = 11;
        buildCal(2026, viewM);
      }

      // Init
      if (localStorage.getItem('theme') === 'dark') {
        document.body.setAttribute("data-theme", "dark");
        document.getElementById("theme-icon").className = "ph ph-moon";
      }
      calc();
      buildCal(2026, viewM);
    </script>
  </body>
</html>
